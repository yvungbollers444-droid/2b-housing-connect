<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Available Rooms</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>

body{margin:0;font-family:'Poppins',sans-serif;background:#fff;color:#111;}
header{padding:20px;text-align:center;font-weight:700;background:#f4f4f4;}
h1{text-align:center;margin-top:40px;}

.room-grid{
display:grid;
grid-template-columns:1fr;
gap:25px;
padding:30px;
}

.room-card{
background:#f7f7f7;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
transition:0.3s;
}

.room-card:hover{
transform:translateY(-5px);
}

.room-card img{
width:100%;
height:220px;
object-fit:cover;
}

.room-card h3{
padding:15px;
margin:0;
}

.room-card p{
padding:0 15px;
color:#555;
}

.button{
display:block;
width:85%;
margin:15px auto 20px;
padding:12px;
background:#111;
color:#fff;
text-align:center;
text-decoration:none;
border-radius:8px;
font-weight:600;
transition:0.3s;
}

.button:hover{
background:#333;
}

@media(min-width:768px){
.room-grid{grid-template-columns:repeat(2,1fr);}
}

</style>
</head>
<body>

<header>2B Housing Connect</header>
<h1>Available Rooms in Buoho</h1>

<div class="room-grid">

<div class="room-card">
<img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85">
<h3>Spacious Single Room</h3>
<p>GHS 4500-5000</p>
<p>Location: Buoho</p>
<a href="room1.html" class="button">View Details</a>
</div>

<div class="room-card">
<img src="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2">
<h3>2 Bedroom Self Contained</h3>
<p>GHS 2,000-2,500</p>
<p>Location: Buoho</p>
<a href="room2.html" class="button">View Details</a>
</div>

</div>

</body>
</html>
